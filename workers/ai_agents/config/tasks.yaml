identify_trends_task:
  description: >
    Analyse the following selection of Hacker News articles and their full content:
    
    {stories}
    
    Review the titles, URLs, upvote scores, and full article contents. Identify the 3 to 5 most 
    significant technological trends, major product launches, or system engineering shifts 
    signified by these articles. Filter out noise, spam, and non-technological topics.
  expected_output: >
    A structured breakdown of the 3-5 main tech trends. For each trend, you MUST provide:
    1. The title of the trend.
    2. A brief explanation of why it is trending today.
    3. A list of the contributing Hacker News stories, including their exact titles and URLs.
  agent: tech_trend_identifier

write_summary_task:
  description: >
    Take the identified tech trends and supporting article highlights provided by the 
    Trend Identifier. Write a cohesive, engaging, and professional daily tech briefing report. 
    You must format the report using EXACTLY the following Markdown structure, without deviation:

    ## Overview
    [A 2-3 sentence executive summary of today's tech climate based on the trends].
    
    ## 1. [Trend Title 1]
    **The Shift:** [One concise sentence summarising the trend]
    
    **Developer Impact:** 
    [Paragraph explaining why software engineers should care]
    
    ## 2. [Trend Title 2]
    ...
    
    ## Sources
    - [Story Title 1](https://example.com)
    - [Story Title 2](https://example.com)
  expected_output: >
    A fully fledged daily tech briefing report.
    CRITICAL FORMATTING RULES:
    1. You MUST use EXACTLY the Markdown structure provided above.
    2. You MUST place an empty blank line after EVERY heading (##) and after EVERY section. Never place body text on the same line as a heading.
    3. DO NOT use ANY H1 (`#`) tags. NEVER start the report with `# Daily Tech Briefing` or similar.
    4. DO NOT include `Volume`, `Issue`, `Date`, or `Topic` preambles at the top.
    5. DO NOT use horizontal rules (`---`).
    6. DO NOT use bullet points for "The Shift" or "Developer Impact". They must be paragraphs.
    7. ALWAYS format the Sources section as a bulleted list of Markdown links EXACTLY like this: `- [Article Title](https://example.com)`. Do not use plain text links.
    8. Write detailed, in-depth paragraphs. Do not skimp on details. We want a comprehensive, long-form analysis for each trend.
  agent: article_writer